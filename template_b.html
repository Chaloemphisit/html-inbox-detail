<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <div class="root-container">
        <div class="inbox-header">
            <img class="header-icon" alt="header-icon" src="assets/images/background-check.png" />
        </div>
        <div class="inbox-container">
            <div class="inbox-content">
                <p class="inbox-title" id="inboxTitle"></p>
                <p class="inbox-description" id="inboxDescription"></p>

                <div class="inbox-content-detail">
                    <div class="row align-items-start">
                        <div class="col text-start">
                            ชื่อ-นามสกุล
                        </div>
                        <div class="col text-end">
                            <strong class="list-group-left" id="fullname">-</strong>
                        </div>
                    </div>
                    <div class="row align-items-start">
                        <div class="col text-start">
                            ผลิตภัณฑ์
                        </div>
                        <div class="col text-end">
                            <strong class="list-group-left" id="product">-</strong>
                        </div>
                    </div>
                    <div class="row align-items-start">
                        <div class="col text-start">
                            ผู้สร้างรายการ
                        </div>
                        <div class="col text-end">
                            <strong class="list-group-left" id="createdBy">-</strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
</body>

</html>
